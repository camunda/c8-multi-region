---
name: Nightly AWS EKS Operational Procedure Test Snapshot

on:
    schedule:
        - cron: 0 2 * * 1 # 02:00 UTC on Monday
    workflow_dispatch:
        inputs:
            helm-versions:
                description: The Helm versions to use as comma separated list
                type: string
    pull_request:
        branches-ignore:
            - stable/**
        # For now limit automatic execution to a minimum, can always be done manually via workflow_dispatch for a branch
        paths:
            - .github/workflows/nightly_teleport_operational_procedure_snapshot.yml
            - .github/workflows/reuseable_teleport_operational_procedure.yml
            - aws/dual-region/kubernetes/**
            - test/**

# limit to a single execution per ref (branch) of this workflow
concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    dynamic-matrix:
        runs-on: ubuntu-latest
        if: github.event_name == 'schedule' || contains(github.head_ref, 'SNAPSHOT')
        outputs:
            matrix: ${{ steps.generate-matrix.outputs.matrix }}
        steps:
            - name: Generate matrix
              id: generate-matrix
              run: |
                  c87=SNAPSHOT

                  if [ "${{ inputs.helm-versions }}" == "" ]; then
                    versions='{"helm-version":["'${c87}'"]}'
                  else
                  output=$(echo "${{ inputs.helm-versions }}" | awk -F, '{
                      for(i=1;i<=NF;i++) {
                        if ($i ~ /^".*"$/) {
                          printf("%s%s", $i, (i==NF)?"":",")
                        } else {
                          printf("\"%s\"%s", $i, (i==NF)?"":",")
                        }
                      }
                    }')
                    versions='{"helm-version":['${output}']}'
                  fi

                  echo "${versions}"
                  echo "matrix=${versions}" >> "$GITHUB_OUTPUT"

    operational-procedure:
        if: github.event_name == 'schedule' || contains(github.head_ref, 'SNAPSHOT')
        needs:
            - dynamic-matrix
        strategy:
            fail-fast: false
            matrix:
                helmChartVersion: ${{fromJson(needs.dynamic-matrix.outputs.matrix).helm-version}}
                # we don't include SNAPSHOT in PR due to the instability of its nature except if it's explicitly mentioned
                isPR:
                    - ${{ github.event_name == 'pull_request' && !contains(github.head_ref, 'SNAPSHOT') }}
                exclude:
                    - helmChartVersion: SNAPSHOT
                      isPR: true
        uses: ./.github/workflows/reusable_teleport_operational_procedure.yml
        with:
            helmChartVersion: ${{ matrix.helmChartVersion }}
            clusterName: camunda-ci-eks
            awsProfile: infex
            testsTfBinaryName: terraform
            namespacePrefix: infraex-
            labels: janitor/ttl=1h camunda.cloud/ephemeral=true
            cluster: camunda.teleport.sh-camunda-ci-eks
            backupBucket: tests-c8-multi-region-es-eu-central-1
            helmReleaseName: camunda
            zeebeClusterSize: 8
        secrets:
            VAULT_ADDR: ${{ secrets.VAULT_ADDR }}
            VAULT_ROLE_ID: ${{ secrets.VAULT_ROLE_ID }}
            VAULT_SECRET_ID: ${{ secrets.VAULT_SECRET_ID }}

    notify-on-failure:
        runs-on: ubuntu-latest
        if: (github.event_name == 'schedule' || contains(github.head_ref, 'SNAPSHOT')) && failure()
        needs:
            - operational-procedure
        steps:
            - name: Notify in Slack in case of failure
              id: slack-notification
              uses: camunda/infraex-common-config/.github/actions/report-failure-on-slack@3b329de512b6e0d86345426754f63abc6c258066 # 1.2.16
              with:
                  vault_addr: ${{ secrets.VAULT_ADDR }}
                  vault_role_id: ${{ secrets.VAULT_ROLE_ID }}
                  vault_secret_id: ${{ secrets.VAULT_SECRET_ID }}
